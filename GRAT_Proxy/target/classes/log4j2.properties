property.filename = app-log.log
property.filepath = C:/GRAT_Proxy
property.backup_path = C:/GRAT_Proxy/backup

appenders = console,rolling
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{2} - %msg%n

appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = ${filepath}/${filename}
appender.rolling.filePattern = ${backup_path}/app-log-%d{yyyy-MM-dd-HH}-%i.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{2} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true

loggers=rolling
logger.rolling.name=com.cognizant
logger.rolling.level = ALL
logger.rolling.appenderRefs = RollingFile
logger.rolling.appenderRef.file.ref = RollingFile


logger.rolling.additivity = false

rootLogger.level = OFF
rootLogger.appenderRefs = stdout
rootLogger.appenderRef.stdout.ref = STDOUT